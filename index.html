<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Time</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Bannière -->
  <div class="banner">
    <div class="container">
      <h1>Screen Time</h1>
      <h2>Rate your films, share your reviews with your friends</h2>
      <a href="#apply-section" class="btn-blue">Apply to Screen Time</a>
    </div>
  </div>

  <!-- Menu -->
  <div class="container">
    <h2>Menu</h2>

    <div class="cards">

      <div class="card">
        <img src="images/reviews.avif" alt="reviews">
        <h3>Reviews</h3>
      </div>

      <div class="card">
        <img src="images/list.avif" alt="list">
        <h3>List</h3>
      </div>

      <div class="card">
        <img src="images/journal.avif" alt="journal">
        <h3>Journal</h3>
      </div>

    </div>
  </div>

  <!-- Section inscription -->
  <div id="apply-section" class="typeform-section">
    <div class="container">
      <a href="https://form.typeform.com/to/hmZQJ28l"
         target="_blank"
         class="btn-blue">
        Apply to Screen Time
      </a>
    </div>
  </div>

</body>
</html>
